<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣重大新聞查核整理</title>
<style>
  :root{
    --bg:#f5f1e8;--card:#fffdf8;--ink:#3a352c;--sub:#7a7263;
    --line:#e5ddcd;--accent:#a8896c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","Hiragino Sans",-apple-system,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
  header{padding:40px 22px 24px;text-align:center;border-bottom:1px solid var(--line)}
  header h1{font-size:1.5rem;font-weight:700}
  header p{color:var(--sub);font-size:.88rem;margin-top:8px}
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 60px}
  .bar{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .update-btn{
    background:var(--accent);color:#fff;border:none;padding:11px 22px;
    border-radius:24px;font-size:.9rem;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:.2s;
  }
  .update-btn:hover{opacity:.9}
  .update-btn:disabled{opacity:.5;cursor:default}
  .status{text-align:center;color:var(--sub);font-size:.82rem;min-height:20px;margin-bottom:14px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
  .filters button{border:1px solid var(--line);background:var(--card);color:var(--sub);
    padding:6px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.18s}
  .filters button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:13px}
  .card .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:7px}
  .date{font-size:.76rem;color:var(--sub);font-variant-numeric:tabular-nums}
  .tag{font-size:.7rem;padding:3px 10px;border-radius:12px;color:#fff}
  .new{font-size:.66rem;background:#c17e5a;color:#fff;padding:2px 7px;border-radius:8px}
  .card h3{font-size:1rem;font-weight:700;margin-bottom:5px}
  .card p{font-size:.88rem;color:#544e43}
  footer{text-align:center;color:var(--sub);font-size:.76rem;padding:26px 20px 40px}
</style>
</head>
<body>
<header>
  <h1>台灣重大新聞查核整理</h1>
  <p>經多方查證的真實事件 · 可讓 AI 抓取最新新聞</p>
</header>

<div class="wrap">
  <div class="bar">
    <button class="update-btn" id="updateBtn">
      <span id="btnIcon">⟳</span><span id="btnText">讓 AI 更新新聞</span>
    </button>
  </div>
  <div class="status" id="status"></div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>
</div>

<footer>
  AI 抓取內容仍建議點原始新聞確認。分類為自動歸類，非官方定性。
</footer>

<script>
const cats = {
  "民生/公安":"#c17e5a","天災":"#7a9a8e","國防/兩岸":"#8a6d8f",
  "政治/司法":"#6d84a8","經濟/產業":"#b39a4d","食安/衛生":"#a86b6b","體育/文化":"#5f9a9a"
};

// 內建的基礎資料（2024–2026 已查證事件）
const seed = [
  {date:"2024-04-03",cat:"天災",title:"花蓮 0403 大地震（規模7.2）",desc:"921以來最大地震，天王星大樓等倒塌，全台18死逾1100傷，重創花蓮觀光。"},
  {date:"2024-11",cat:"體育/文化",title:"世界棒球12強賽 台灣奪冠",desc:"中華隊終結日本連勝奪世界冠軍，為隊史首座此級別世界冠軍。"},
  {date:"2025-02-13",cat:"民生/公安",title:"台中新光三越氣爆",desc:"中港店大規模氣爆，5死38傷，史上最嚴重百貨公安事故之一。"},
  {date:"2025-05-19",cat:"民生/公安",title:"三峽高齡駕駛暴衝車禍",desc:"78歲駕駛暴衝造成3死12傷，促成2026年5月起換照年齡下修至70歲。"},
  {date:"2025-10",cat:"食安/衛生",title:"台中爆非洲豬瘟 禁廚餘養豬",desc:"養豬場驗出非洲豬瘟，政府下禁宰禁運令並禁廚餘養豬，約15天後解禁。"},
  {date:"2025-12-19",cat:"民生/公安",title:"台北車站周邊隨機攻擊案",desc:"張姓男子持刀與汽油彈隨機攻擊，含犯嫌在內4死11傷，最後墜樓身亡。"},
  {date:"2026-01-06",cat:"國防/兩岸",title:"空軍F-16夜訓失事",desc:"飛行員辛柏毅上尉駕F-16於花蓮豐濱外海夜間訓練疑空間迷向失事。"},
  {date:"2026-01-28",cat:"食安/衛生",title:"台中豐原禽流感感染事件",desc:"台中豐原爆發禽流感感染事件，衛生單位介入處理與追蹤。"}
];

let active = "全部";

function load(){
  const saved = localStorage.getItem("tw_news");
  return saved ? JSON.parse(saved) : seed;
}
function save(arr){ localStorage.setItem("tw_news", JSON.stringify(arr)); }

function draw(){
  const all = load();
  const filtered = active==="全部" ? all : all.filter(n=>n.cat===active);
  const sorted = [...filtered].sort((a,b)=> a.date < b.date ? 1 : -1);
  document.getElementById("list").innerHTML = sorted.map(n=>`
    <div class="card">
      <div class="top">
        <span class="date">${n.date}</span>
        <span class="tag" style="background:${cats[n.cat]||'#999'}">${n.cat}</span>
        ${n.isNew ? '<span class="new">新</span>' : ''}
      </div>
      <h3>${n.title}</h3>
      <p>${n.desc}</p>
    </div>`).join("");
}

function buildFilters(){
  const f = document.getElementById("filters");
  const all = ["全部", ...Object.keys(cats)];
  f.innerHTML = all.map(c=>`<button data-c="${c}" ${c==="全部"?'class="active"':''}>${c}</button>`).join("");
  f.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{
      active=b.dataset.c;
      f.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      draw();
    };
  });
}

// 核心：呼叫後端 /api/news，讓 AI 抓最新新聞
async function update(){
  const btn = document.getElementById("updateBtn");
  const status = document.getElementById("status");
  btn.disabled = true;
  document.getElementById("btnIcon").textContent = "…";
  document.getElementById("btnText").textContent = "AI 查詢中，約需20秒";
  status.textContent = "正在請 AI 搜尋並查證最新新聞…";

  try {
    const existing = load();
    // 找出目前最新的日期，和所有現有標題，一起傳給後端
    const latestDate = existing.reduce((m,n)=> n.date>m ? n.date : m, "");
    const r = await fetch("/api/news", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        latestDate,
        titles: existing.map(n=>n.title)
      })
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    const titles = new Set(existing.map(n=>n.title));
    const fresh = (data.items||[]).filter(n=>n.title && !titles.has(n.title));
    fresh.forEach(n=>n.isNew = true);

    if (fresh.length === 0){
      status.textContent = "沒有查到新的事件（現有內容已是最新）。";
    } else {
      // 清掉舊的「新」標記，加入新資料
      existing.forEach(n=>delete n.isNew);
      save([...fresh, ...existing]);
      status.textContent = `已新增 ${fresh.length} 則新聞。`;
      draw();
    }
  } catch (e) {
    status.textContent = "更新失敗：" + e.message;
  } finally {
    btn.disabled = false;
    document.getElementById("btnIcon").textContent = "⟳";
    document.getElementById("btnText").textContent = "讓 AI 更新新聞";
  }
}

document.getElementById("updateBtn").onclick = update;
buildFilters();
draw();
</script>
</body>
</html>
